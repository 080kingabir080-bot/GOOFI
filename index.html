<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO-PLAY | Premium Gaming Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e94560; --secondary: #0f3460; --accent: #00d2ff; --premium: #ffd700; }
        
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; font-family: 'Assistant', sans-serif;
            background: #050505; color: white;
        }

        /* רקע דינמי משתנה לפרימיום */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1; transition: 1s;
        }
        body.is-premium .bg-animate {
            background: radial-gradient(circle at 50% 50%, #2e2400 0%, #050505 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* כפתור רכישה בצורת מתנה */
        .gift-btn {
            position: relative;
            background: #e94560;
            padding: 20px 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
        }
        /* הסרט של המתנה */
        .gift-btn::before { /* סרט אופקי */
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 10px;
            background: #ffffff; transform: translateY(-50%); opacity: 0.8;
        }
        .gift-btn::after { /* סרט אנכי */
            content: ''; position: absolute; top: 0; left: 30%; width: 10px; height: 100%;
            background: #ffffff; opacity: 0.8;
        }
        .gift-btn:hover { transform: scale(1.05) rotate(-2deg); box-shadow: 0 0 20px #e94560; }

        /* כרטיס פרימיום */
        .premium-border { border: 2px solid var(--premium) !important; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .premium-text { background: linear-gradient(to left, #ffd700, #ffae00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }

        /* דפים */
        .page { display: none; height: 100vh; width: 100vw; animation: fadeIn 0.5s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* לואדר אימות */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #ffd700;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animate"></div>

    <section id="homePage" class="page active flex-col">
        <header class="h-20 flex items-center justify-between px-8 glass m-4" id="mainHeader">
            <h1 class="text-3xl font-bold text-cyan-400 italic">PRO-<span class="text-white">PLAY</span></h1>
            <div id="navButtons" class="flex gap-4">
                <button onclick="nav('loginPage')" class="px-5 py-2 border border-white/20 rounded-full hover:bg-white/10">התחברות</button>
                <button onclick="nav('registerPage')" class="px-5 py-2 bg-cyan-500 rounded-full font-bold hover:bg-cyan-400">הירשם חינם</button>
            </div>
        </header>
        <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 p-8 overflow-y-auto">
            </div>
    </section>

    <section id="premiumPage" class="page items-center justify-center">
        <div class="glass p-10 w-[500px] text-center border-2 border-yellow-500/30">
            <h2 class="text-4xl font-black mb-2 premium-text">Upgrade to PREMIUM</h2>
            <p class="text-white/60 mb-8">הפוך למקצוען ותהנה מיתרונות בלעדיים</p>
            
            <div class="grid grid-cols-2 gap-4 mb-10 text-right">
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">⭐ גישה למשחקי VIP</div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">🚀 ללא פרסומות לנצח</div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">💎 תג PREMIUM מוזהב</div>
                <div class="bg-white/5 p-3 rounded-xl border border-white/10">🎧 איכות סאונד HQ</div>
            </div>

            <div id="paymentForm" class="space-y-4">
                <input type="text" id="payUser" placeholder="שם משתמש" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                <input type="email" id="payEmail" placeholder="אימייל" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                <input type="password" id="payPass" placeholder="סיסמה לאימות" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                
                <div class="flex flex-col items-center gap-4 pt-4">
                    <button id="buyGiftBtn" onclick="processPurchase()" class="gift-btn">רכוש מנוי עכשיו</button>
                    <div id="purchaseLoader" class="loader"></div>
                </div>
            </div>

            <div id="successMessage" class="hidden animate-bounce">
                <div class="text-6xl mb-4">🏆</div>
                <h3 class="text-2xl font-bold mb-2">הרכישה בוצעה בהצלחה!</h3>
                <p class="mb-6">תודה שהצטרפת לקהילת הפרימיום שלנו.</p>
                <button onclick="activatePremium()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl">הפעל מנוי פרימיום</button>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
