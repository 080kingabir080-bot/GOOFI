<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO-PLAY | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e94560; --premium: #ffd700; --cyan: #00d2ff; }
        
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; font-family: 'Assistant', sans-serif;
            background: #050505; color: white; transition: 1s ease;
        }

        .site-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            transition: 1.5s;
        }
        body.is-premium .site-bg { background: radial-gradient(circle at 50% 50%, #2e2400 0%, #050505 100%); }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* כפתור מתנה משונן */
        .gift-btn-container { position: relative; display: inline-block; transform: rotate(-3deg); margin-top: 20px; }
        .gift-btn {
            position: relative; background: #e94560; color: white; padding: 30px 60px; font-weight: 900; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s;
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
            border: none;
        }
        .gift-btn::before { content: ''; position: absolute; top: 46%; left: 0; width: 100%; height: 14px; background: #fff; z-index: 1; }
        .gift-btn::after { content: ''; position: absolute; top: 0; left: 25%; width: 14px; height: 100%; background: #fff; z-index: 1; }
        .gift-btn span { position: relative; z-index: 2; }

        /* עיצוב כרטיס משחק */
        .game-card {
            aspect-ratio: 1 / 1;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
        }
        .game-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.08); }

        /* פאנל ניהול - שולחן עבודה */
        .admin-icon {
            width: 100px; height: 100px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-icon:hover { background: rgba(0, 210, 255, 0.2); border-color: var(--cyan); }
        
        .admin-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; height: auto; max-height: 80vh;
            z-index: 100; display: none; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .loader-progress { width: 0%; height: 100%; background: var(--premium); transition: 6s linear; }

        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #gameOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #gameFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="is-normal">
    <div class="site-bg"></div>

    <section id="homePage" class="page active">
        <header class="h-20 flex items-center justify-between px-8 glass m-4 rounded-2xl">
            <h1 class="text-3xl font-black italic">PRO-<span id="logoAccent" style="color:var(--cyan)">PLAY</span></h1>
            <div id="authArea" class="flex gap-3">
                <button onclick="nav('loginPage')" class="px-5 py-2 border border-white/10 rounded-xl text-sm">התחברות</button>
                <button onclick="nav('registerPage')" class="px-5 py-2 bg-white text-black font-bold rounded-xl text-sm">הרשמה</button>
            </div>
        </header>
        <main id="gameGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-4 p-6 overflow-y-auto flex-1 content-start"></main>
    </section>

    <section id="premiumPage" class="page items-center justify-center">
        <div class="glass p-10 rounded-[35px] w-full max-w-lg text-center relative">
            <button onclick="nav('homePage')" class="absolute top-6 right-8 opacity-40">✕</button>
            <h2 class="text-4xl font-black mb-8 text-[var(--premium)]">PREMIUM</h2>
            <div id="buyButtonWrapper">
                <div class="gift-btn-container"><button onclick="startPayment()" class="gift-btn"><span>רכוש מנוי מתנה</span></button></div>
            </div>
            <div id="verificationUI" class="hidden mt-6">
                <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden"><div id="pBar" class="loader-progress"></div></div>
                <p class="text-yellow-500 mt-4 animate-pulse">מאמת רכישה (6 שניות)...</p>
            </div>
            <div id="successUI" class="hidden mt-6">
                <button onclick="applyPremium()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl text-xl">הפעל פרימיום ✅</button>
            </div>
        </div>
    </section>

    <section id="adminPage" class="page">
        <div class="h-16 flex items-center justify-between px-8 bg-white/5 backdrop-blur-md border-b border-white/10">
            <span class="font-black text-yellow-500">PRO-ADMIN OS</span>
            <button onclick="nav('homePage')" class="text-xs bg-red-600/20 hover:bg-red-600 px-4 py-1 rounded-lg transition">יציאה מהמערכת</button>
        </div>
        
        <div class="flex-1 p-10 flex gap-10 flex-wrap content-start">
            <div class="admin-icon" onclick="openAdminTool('addGameTool')">
                <span class="text-3xl mb-2">➕</span>
                <span class="text-[10px] font-bold">הוספת משחק</span>
            </div>
            <div class="admin-icon" onclick="openAdminTool('manageGamesTool')">
                <span class="text-3xl mb-2">📂</span>
                <span class="text-[10px] font-bold">ספריית קוד</span>
            </div>
            <div class="admin-icon" onclick="alert('בפיתוח: בקרוב תוכל לראות מי נרשם')">
                <span class="text-3xl mb-2">👥</span>
                <span class="text-[10px] font-bold">משתמשים</span>
            </div>
        </div>

        <div id="addGameTool" class="admin-window glass rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h3 class="font-bold">הוספת משחק חדש</h3>
                <button onclick="closeAdminTool('addGameTool')" class="opacity-50">✕</button>
            </div>
            <input type="text" id="adm_name" placeholder="שם המשחק" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-4">
            <textarea id="adm_code" rows="6" placeholder="קוד המשחק (HTML/JS)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-4 font-mono text-xs"></textarea>
            <button onclick="saveNewGame()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold">פרסם לספריה</button>
        </div>

        <div id="manageGamesTool" class="admin-window glass rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h3 class="font-bold">ניהול משחקים קיימים</h3>
                <button onclick="closeAdminTool('manageGamesTool')" class="opacity-50">✕</button>
            </div>
            <div id="adminGameList" class="space-y-2 overflow-y-auto max-h-[50vh]"></div>
        </div>
    </section>

    <div id="gameOverlay">
        <div class="h-14 flex items-center justify-between px-6 bg-black/80 border-b border-white/10">
            <h2 id="ovTitle" class="font-bold italic"></h2>
            <button onclick="closeGame()" class="text-3xl hover:text-red-500">&times;</button>
        </div>
        <iframe id="gameFrame"></iframe>
    </div>

    <section id="loginPage" class="page items-center justify-center">
        <div class="glass p-10 rounded-3xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-6">כניסה</h2>
            <input type="text" id="l_user" placeholder="שם" class="w-full bg-white/5 p-3 rounded-xl mb-3 border border-white/10">
            <input type="password" id="l_pass" placeholder="סיסמה" class="w-full bg-white/5 p-3 rounded-xl mb-6 border border-white/10">
            <button onclick="processLogin()" class="w-full py-3 bg-cyan-600 rounded-xl">התחבר</button>
        </div>
    </section>

    <section id="registerPage" class="page items-center justify-center">
        <div class="glass p-10 rounded-3xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-6">הרשמה</h2>
            <input type="text" id="r_user" placeholder="שם" class="w-full bg-white/5 p-3 rounded-xl mb-3 border border-white/10">
            <input type="password" id="r_pass" placeholder="סיסמה" class="w-full bg-white/5 p-3 rounded-xl mb-6 border border-white/10">
            <button onclick="processRegister()" class="w-full py-3 bg-white text-black rounded-xl font-bold">צור חשבון</button>
        </div>
    </section>

    <script>
        const LOG_EMAIL = "movies0pop0@gmail.com";
        let games = JSON.parse(localStorage.getItem('pp_final_g')) || [];
        let users = JSON.parse(localStorage.getItem('pp_final_u')) || [];
        let currentUser = JSON.parse(sessionStorage.getItem('pp_active')) || null;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'homePage') renderGames();
            if(id === 'adminPage') renderAdminGames();
        }

        // פונקציות אדמין חדשות
        function openAdminTool(id) { document.getElementById(id).style.display = 'flex'; }
        function closeAdminTool(id) { document.getElementById(id).style.display = 'none'; }

        function processRegister() {
            const u = document.getElementById('r_user').value;
            const p = document.getElementById('r_pass').value;
            if(!u || !p) return;
            users.push({name: u, pass: p, isPrem: false});
            localStorage.setItem('pp_final_u', JSON.stringify(users));
            console.log(`Log to ${LOG_EMAIL}: New User ${u}`);
            nav('loginPage');
        }

        function processLogin() {
            const u = document.getElementById('l_user').value;
            const p = document.getElementById('l_pass').value;
            if(u === 'admin' && p === 'admin') return nav('adminPage');
            const found = users.find(x => x.name === u && x.pass === p);
            if(found) { currentUser = found; sessionStorage.setItem('pp_active', JSON.stringify(found)); checkPremium(); nav('homePage'); }
            else alert("שגוי");
        }

        function startPayment() {
            document.getElementById('buyButtonWrapper').classList.add('hidden');
            document.getElementById('verificationUI').classList.remove('hidden');
            document.getElementById('pBar').style.width = "100%";
            setTimeout(() => {
                console.log(`Log to ${LOG_EMAIL}: Premium Buy: ${currentUser?.name}`);
                document.getElementById('verificationUI').classList.add('hidden');
                document.getElementById('successUI').classList.remove('hidden');
            }, 6000);
        }

        function applyPremium() {
            if(currentUser) {
                currentUser.isPrem = true;
                const idx = users.findIndex(x => x.name === currentUser.name);
                if(idx !== -1) users[idx].isPrem = true;
                localStorage.setItem('pp_final_u', JSON.stringify(users));
                sessionStorage.setItem('pp_active', JSON.stringify(currentUser));
            }
            checkPremium(); nav('homePage');
        }

        function checkPremium() {
            if(currentUser?.isPrem) {
                document.body.className = 'is-premium';
                document.getElementById('logoAccent').style.color = 'var(--premium)';
            }
        }

        function saveNewGame() {
            const n = document.getElementById('adm_name').value;
            const c = document.getElementById('adm_code').value;
            if(!n || !c) return;
            games.push({id: Date.now(), title: n, code: c});
            localStorage.setItem('pp_final_g', JSON.stringify(games));
            renderAdminGames();
            alert("המשחק נוסף בהצלחה!");
            closeAdminTool('addGameTool');
        }

        function renderGames() {
            const grid = document.getElementById('gameGrid');
            const isP = currentUser?.isPrem;
            grid.innerHTML = games.map(g => `
                <div class="game-card" onclick="openGame('${g.id}')">
                    <div class="text-4xl mb-2">${isP ? '💎' : '🎮'}</div>
                    <span class="text-[10px] font-bold text-center px-2">${g.title}</span>
                </div>
            `).join('');

            const auth = document.getElementById('authArea');
            if(currentUser) {
                auth.innerHTML = `
                    ${!isP ? '<button onclick="nav(\'premiumPage\')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-xl font-bold text-xs">UPGRADE</button>' : ''}
                    <span class="self-center text-xs font-bold ${isP ? 'text-yellow-500' : ''}">${currentUser.name}</span>
                    <button onclick="sessionStorage.clear(); location.reload();" class="opacity-20 text-[10px]">יציאה</button>
                `;
            }
        }

        function renderAdminGames() {
            document.getElementById('adminGameList').innerHTML = games.map(g => `
                <div class="flex justify-between items-center glass p-3 rounded-xl text-xs">
                    <span>${g.title}</span>
                    <button onclick="delGame(${g.id})" class="text-red-500 font-bold px-2">מחק</button>
                </div>
            `).join('');
        }

        function delGame(id) { games = games.filter(g => g.id != id); localStorage.setItem('pp_final_g', JSON.stringify(games)); renderAdminGames(); }

        function openGame(id) {
            const g = games.find(x => x.id == id);
            document.getElementById('ovTitle').innerText = g.title;
            const blob = new Blob([g.code], {type: 'text/html'});
            document.getElementById('gameFrame').src = URL.createObjectURL(blob);
            document.getElementById('gameOverlay').style.display = 'flex';
        }

        function closeGame() { document.getElementById('gameOverlay').style.display = 'none'; document.getElementById('gameFrame').src = ''; }

        window.onload = () => { checkPremium(); renderGames(); };
    </script>
</body>
</html>
