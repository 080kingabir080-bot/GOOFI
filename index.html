<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT OS | SECURE ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@200;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff0055;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.02) 0%, transparent 50%);
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
        }

        .admin-only { display: none; }
        
        .login-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon) !important; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .btn-neon {
            background: var(--neon);
            color: black;
            font-weight: 900;
            transition: 0.3s;
        }

        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loginPage" class="login-overlay">
        <div class="glass-card p-10 rounded-3xl w-full max-w-md border-t-4 border-t-[var(--neon)]">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black italic tracking-tighter">GATEWAY <span class="text-[var(--neon)]">LOGIN</span></h2>
                <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mt-2">Restricted Access Area</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold opacity-50 block mb-1">IDENTIFIER</label>
                    <input type="text" id="loginUser" class="w-full p-4 rounded-xl" placeholder="ADMIN">
                </div>
                <div>
                    <label class="text-[10px] font-bold opacity-50 block mb-1">ENCRYPTION KEY</label>
                    <input type="password" id="loginPass" class="w-full p-4 rounded-xl" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="btn-neon w-full py-4 rounded-xl mt-4 uppercase">Initialize Session</button>
                <button onclick="bypassToGuest()" class="w-full py-2 text-xs opacity-40 hover:opacity-100 transition">Enter as Guest (View Only)</button>
            </div>
            <p id="loginError" class="text-[var(--danger)] text-xs mt-4 text-center hidden">INVALID CREDENTIALS</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="max-w-7xl mx-auto mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">ROOT <span class="text-[var(--neon)]">OS</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="roleDot" class="status-dot"></span>
                    <span id="roleText" class="text-[10px] font-mono uppercase"></span>
                </div>
            </div>
            <button onclick="handleLogout()" class="px-4 py-2 glass-card rounded-lg text-xs hover:text-[var(--danger)] transition">LOGOUT_SYSTEM</button>
        </header>

        <div class="max-w-7xl mx-auto mb-8">
            <input type="text" id="m_search" oninput="m_refresh()" placeholder="חפש בזיכרון המערכת..." class="w-full p-5 rounded-2xl text-lg glass-card">
        </div>

        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section>
                <h2 class="text-sm font-black text-[var(--neon)] mb-4 font-mono">// DATABASE_GAMES</h2>
                <div id="cat-games" class="space-y-3"></div>
            </section>
            <section>
                <h2 class="text-sm font-black text-[var(--neon)] mb-4 font-mono">// DATABASE_TOOLS</h2>
                <div id="cat-tools" class="space-y-3"></div>
            </section>
        </div>

        <button id="addBtn" onclick="m_open_new()" class="admin-only fixed bottom-8 left-8 w-16 h-16 btn-neon rounded-2xl text-3xl shadow-2xl">+</button>
    </div>

    <div id="masterEditor" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[3000] hidden p-4 flex items-center justify-center">
        <div class="glass-card w-full max-w-4xl rounded-3xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="font-black italic text-xl">OBJECT_RECONSTRUCTOR</h2>
                <button onclick="m_close()" class="text-2xl opacity-50">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="m_name" placeholder="Object Name" class="p-4 rounded-xl">
                    <select id="m_type" class="p-4 rounded-xl">
                        <option value="game">Game</option>
                        <option value="tool">Tool</option>
                    </select>
                </div>
                <input type="text" id="m_visual" placeholder="Visual (URL or Emoji)" class="w-full p-4 rounded-xl">
                <textarea id="m_code" class="w-full h-64 p-6 rounded-xl font-mono text-sm text-green-400" placeholder="// Insert Source Code..."></textarea>
            </div>
            <div class="p-6 border-t border-white/10 flex justify-between bg-white/5">
                <button onclick="m_delete()" class="text-[var(--danger)] font-bold px-4">DELETE</button>
                <div class="flex gap-3">
                    <button onclick="m_close()" class="px-6 opacity-50">CANCEL</button>
                    <button onclick="m_save()" class="btn-neon px-8 py-3 rounded-xl">DEPLOY CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'pp_ultra_v2';
        let currentId = null;
        let isAdmin = false;

        // AUTH SYSTEM
        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const error = document.getElementById('loginError');

            if(user === 'ADMIN' && pass === 'ADMIN1') {
                isAdmin = true;
                sessionStorage.setItem('root_auth', 'true');
                startApp();
            } else {
                error.classList.remove('hidden');
            }
        }

        function bypassToGuest() {
            isAdmin = false;
            sessionStorage.setItem('root_auth', 'false');
            startApp();
        }

        function handleLogout() {
            sessionStorage.removeItem('root_auth');
            location.reload();
        }

        function startApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            
            const roleDot = document.getElementById('roleDot');
            const roleText = document.getElementById('roleText');
            
            if(isAdmin) {
                roleDot.style.backgroundColor = 'var(--neon)';
                roleText.innerText = 'Administrator Access';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            } else {
                roleDot.style.backgroundColor = '#555';
                roleText.innerText = 'Guest Observer';
            }
            m_refresh();
        }

        // APP LOGIC
        const getDB = () => JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const saveDB = (db) => localStorage.setItem(DB_KEY, JSON.stringify(db));

        function m_refresh() {
            const db = getDB();
            const query = document.getElementById('m_search').value.toLowerCase();
            const cats = { game: document.getElementById('cat-games'), tool: document.getElementById('cat-tools') };
            
            cats.game.innerHTML = ''; cats.tool.innerHTML = '';

            db.filter(x => x.title.toLowerCase().includes(query)).forEach(item => {
                const card = document.createElement('div');
                card.className = "glass-card p-4 rounded-xl flex justify-between items-center group transition hover:border-[var(--neon)] cursor-pointer";
                
                // במידה ומנהל מחובר, לחיצה פותחת עריכה. במידה ולא - לחיצה יכולה להפעיל קוד (כאן רק הצגנו)
                if(isAdmin) card.onclick = () => m_open(item.id);

                const visual = item.visual && item.visual.startsWith('http') 
                    ? `<img src="${item.visual}" class="w-full h-full object-cover">`
                    : `<span class="text-xl">${item.visual || '💾'}</span>`;

                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center overflow-hidden border border-white/5">${visual}</div>
                        <div>
                            <div class="text-sm font-bold uppercase tracking-tight">${item.title}</div>
                            <div class="text-[9px] font-mono opacity-30 italic">${item.id}</div>
                        </div>
                    </div>
                    ${isAdmin ? '<span class="text-[var(--neon)] opacity-0 group-hover:opacity-100 text-xs font-bold">EDIT_OBJ</span>' : ''}
                `;
                cats[item.type].appendChild(card);
            });
        }

        function m_open(id) {
            if(!isAdmin) return;
            const item = getDB().find(x => x.id === id);
            currentId = id;
            document.getElementById('m_name').value = item.title;
            document.getElementById('m_type').value = item.type;
            document.getElementById('m_visual').value = item.visual;
            document.getElementById('m_code').value = item.code;
            document.getElementById('masterEditor').classList.remove('hidden');
        }

        function m_open_new() {
            currentId = null;
            document.getElementById('m_name').value = '';
            document.getElementById('m_visual').value = '';
            document.getElementById('m_code').value = '';
            document.getElementById('masterEditor').classList.remove('hidden');
        }

        function m_save() {
            let db = getDB();
            const data = {
                id: currentId || 'sys-' + Math.random().toString(36).substr(2, 7),
                title: document.getElementById('m_name').value,
                type: document.getElementById('m_type').value,
                visual: document.getElementById('m_visual').value,
                code: document.getElementById('m_code').value
            };

            if(currentId) {
                const idx = db.findIndex(x => x.id === currentId);
                db[idx] = data;
            } else {
                db.push(data);
            }

            saveDB(db);
            m_close();
            m_refresh();
        }

        function m_delete() {
            if(!confirm("PURGE DATA?")) return;
            saveDB(getDB().filter(x => x.id !== currentId));
            m_close();
            m_refresh();
        }

        function m_close() { document.getElementById('masterEditor').classList.add('hidden'); }

        // Auto-check session on load
        window.onload = () => {
            const auth = sessionStorage.getItem('root_auth');
            if(auth === 'true') {
                isAdmin = true;
                startApp();
            } else if(auth === 'false') {
                isAdmin = false;
                startApp();
            }
        };
    </script>
</body>
</html>
