<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ניהול ומשתמשים מלאה</title>
    <style>
        :root { --primary: #4a90e2; --admin: #e74c3c; --user: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: #666; color: white; margin-top: 20px; }
        .toggle-link { text-align: center; margin-top: 15px; color: var(--primary); cursor: pointer; font-size: 0.9em; }
        .hidden { display: none; }
        .status-card { padding: 15px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .admin-view { border-top: 8px solid var(--admin); }
        .user-view { border-top: 8px solid var(--user); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="authSection">
        <h2 id="authTitle">התחברות</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        
        <div id="registerFields" class="hidden">
            <select id="role">
                <option value="user">משתמש רגיל</option>
                <option value="admin">מנהל מערכת</option>
            </select>
        </div>

        <button onclick="handleAuth()" class="btn-login" id="mainBtn">כניסה</button>
        <div class="toggle-link" onclick="toggleAuthMode()" id="toggleLink">אין לך חשבון? הירשם כאן</div>
    </div>

    <div id="adminPanel" class="hidden admin-view">
        <h2 style="color: var(--admin)">פאנל ניהול מנהל</h2>
        <p>רשימת משתמשים רשומים במערכת:</p>
        <table id="userTable">
            <thead>
                <tr>
                    <th>אימייל</th>
                    <th>תפקיד</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
        <button onclick="logout()" class="btn-logout">התנתק</button>
    </div>

    <div id="userPage" class="hidden user-view">
        <h2 style="color: var(--user)">אזור אישי</h2>
        <div class="status-card" style="background: #eafaf1;">
            <p>שלום, <strong id="userDisplayName"></strong>!</p>
            <p>התחברת בהצלחה כמשתמש רגיל.</p>
        </div>
        <button onclick="logout()" class="btn-logout">התנתק</button>
    </div>
</div>

<script>
    // אתחול נתונים - בודק אם יש משתמשים ב-LocalStorage, אם לא יוצר רשימה ריקה
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let isRegisterMode = false;

    // בדיקה אם יש משתמש שכבר מחובר (Keep Login)
    window.onload = () => {
        const loggedInUser = JSON.parse(localStorage.getItem('currentUser'));
        if (loggedInUser) {
            showCorrectPage(loggedInUser);
        }
    };

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('registerFields').classList.toggle('hidden');
        document.getElementById('authTitle').innerText = isRegisterMode ? 'הרשמה חדשה' : 'התחברות';
        document.getElementById('mainBtn').innerText = isRegisterMode ? 'צור חשבון' : 'כניסה';
        document.getElementById('toggleLink').innerText = isRegisterMode ? 'כבר יש לך חשבון? התחבר' : 'אין לך חשבון? הירשם כאן';
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        if (!email || !pass) return alert("נא למלא את כל השדות");

        if (isRegisterMode) {
            // לוגיקת הרשמה
            if (users.find(u => u.email === email)) return alert("משתמש זה כבר קיים");
            const newUser = { email, pass, role };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            alert("נרשמת בהצלחה! עובר להתחברות");
            toggleAuthMode();
        } else {
            // לוגיקת התחברות
            const user = users.find(u => u.email === email && u.pass === pass);
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showCorrectPage(user);
            } else {
                alert("אימייל או סיסמה שגויים");
            }
        }
    }

    function showCorrectPage(user) {
        document.getElementById('authSection').classList.add('hidden');
        
        if (user.role === 'admin') {
            document.getElementById('adminPanel').classList.remove('hidden');
            renderUserTable();
        } else {
            document.getElementById('userPage').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = user.email;
        }
    }

    function renderUserTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.email}</td>
                <td>${u.role === 'admin' ? 'מנהל' : 'משתמש'}</td>
            </tr>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }
</script>

</body>
</html>
