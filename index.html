<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-TERMINAL X | Premium Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --premium: #ffd700;
            --accent-red: #e94560;
            --bg-deep: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background-color: var(--bg-deep); color: white;
            font-family: 'Assistant', sans-serif;
        }

        /* רקע דינמי משודרג - "רשת קוונטית" */
        .quantum-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 50% 50%, #0a1128 0%, #020205 100%),
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            animation: grid-pulse 10s ease-in-out infinite;
        }

        @keyframes grid-pulse {
            0%, 100% { background-position: 0 0, 0 0, 0 0; opacity: 0.8; }
            50% { background-position: 0 0, 25px 25px, 25px 25px; opacity: 1; }
        }

        /* עיצוב זכוכית (Glassmorphism) */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        /* אפקט זהב פרימיום */
        .gold-glow {
            border: 1px solid var(--premium);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            position: relative;
        }
        .gold-glow::before {
            content: ''; position: absolute; inset: 0; border-radius: inherit;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            animation: sweep 3s linear infinite;
        }

        @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* כרטיסי אפליקציה */
        .app-card {
            transition: var(--transition);
            cursor: pointer; position: relative;
        }
        .app-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }

        /* טרמינל ניהול */
        .terminal-window {
            display: none; position: fixed; inset: 50px; z-index: 1000;
            flex-direction: column; overflow: hidden;
        }
        .terminal-header {
            background: rgba(255,255,255,0.05); padding: 12px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* סליידרים וכפתורים */
        .btn-action {
            padding: 10px 20px; border-radius: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-cyan { background: var(--primary); color: black; }
        .btn-cyan:hover { box-shadow: 0 0 20px var(--primary); transform: brightness(1.1); }

        .loader-ring {
            width: 50px; height: 50px; border: 3px solid transparent;
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="quantum-bg"></div>

    <div id="app" class="h-screen w-screen flex flex-col p-6 gap-6">
        
        <header class="glass h-24 flex items-center justify-between px-10 shrink-0 border-b border-white/5">
            <div class="flex items-center gap-6">
                <div class="p-3 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl shadow-lg shadow-cyan-500/20">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-tight text-white">ULTRA-<span class="text-cyan-400">CORE</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-cyan-500/60 font-bold">X-Series Autonomous Terminal</p>
                </div>
            </div>

            <div id="auth-panel" class="flex items-center gap-4">
                </div>
        </header>

        <main id="core-grid" class="flex-1 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 overflow-y-auto p-4 content-start">
            </main>

        <footer class="glass h-12 flex items-center justify-between px-10 text-[10px] font-mono text-white/40 uppercase tracking-widest shrink-0">
            <div class="flex gap-6">
                <span>System Status: <span class="text-green-500">Operational</span></span>
                <span id="uptime-display">Uptime: 00:00:00</span>
            </div>
            <div id="version-tag">Version 10.4.2 [Quantum Alpha]</div>
        </footer>
    </div>

    <div id="view-overlay" class="fixed inset-0 z-[2000] glass hidden flex-col border-none rounded-none">
        <div class="terminal-header">
            <h2 id="view-title" class="font-black italic text-cyan-400">LOADING APP...</h2>
            <button onclick="CoreEngine.closeApp()" class="text-3xl font-light hover:text-red-500 transition-colors">&times;</button>
        </div>
        <div class="flex-1 relative">
            <div id="app-loader" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10">
                <div class="loader-ring"></div>
            </div>
            <iframe id="app-frame" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <div id="admin-panel" class="terminal-window glass shadow-2xl">
        <div class="terminal-header">
            <span class="font-black text-xs text-red-500 tracking-widest">SYSTEM_CORE_MODERATOR // ACCESS: GRANTED</span>
            <button onclick="CoreEngine.togglePanel('admin-panel')" class="text-xl">&times;</button>
        </div>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-64 bg-white/5 border-r border-white/5 p-6 space-y-4">
                <button onclick="CoreEngine.switchAdminTab('add')" class="w-full text-right p-3 rounded-xl hover:bg-cyan-500/10 text-xs font-bold transition">הוספת תוכן</button>
                <button onclick="CoreEngine.switchAdminTab('manage')" class="w-full text-right p-3 rounded-xl hover:bg-cyan-500/10 text-xs font-bold transition">ניהול רשימות</button>
                <button onclick="CoreEngine.switchAdminTab('system')" class="w-full text-right p-3 rounded-xl hover:bg-cyan-500/10 text-xs font-bold transition">הגדרות ליבה</button>
                <button onclick="CoreEngine.switchAdminTab('logs')" class="w-full text-right p-3 rounded-xl hover:bg-cyan-500/10 text-xs font-bold transition">יומן אירועים</button>
            </div>
            <div id="admin-view" class="flex-1 p-10 overflow-y-auto font-mono">
                </div>
        </div>
    </div>

    <script>
        const CoreEngine = {
            state: {
                user: JSON.parse(localStorage.getItem('ultra_x_user')) || null,
                db: JSON.parse(localStorage.getItem('ultra_x_db')) || [
                    { id: 101, title: 'Business Caesar', type: 'game', premium: true, code: '<h1>Business Caesar Engine</h1>' },
                    { id: 102, title: 'Military Strategy', type: 'game', premium: false, code: '<h1>War Room</h1>' },
                    { id: 103, title: 'Monster Tamer', type: 'game', premium: true, code: '<h1>Pet Lab</h1>' }
                ],
                logs: JSON.parse(localStorage.getItem('ultra_x_logs')) || [],
                startTime: Date.now()
            },

            init() {
                this.renderUI();
                this.updateUptime();
                setInterval(() => this.updateUptime(), 1000);
            },

            // --- UI RENDERERS ---
            renderUI() {
                this.renderAuth();
                this.renderGrid();
            },

            renderAuth() {
                const panel = document.getElementById('auth-panel');
                if (this.state.user) {
                    const isPremium = this.state.user.role === 'admin';
                    panel.innerHTML = `
                        <div class="flex items-center gap-6 glass p-2 px-6 rounded-2xl border-white/5">
                            <div class="text-right">
                                <div class="text-xs font-black flex items-center gap-2 justify-end">
                                    ${isPremium ? '<span class="text-amber-500 animate-pulse">💎 ULTIMATE</span>' : '<span class="text-cyan-400">ASAD_TESTER</span>'}
                                    <span class="text-white">${this.state.user.name}</span>
                                </div>
                                <div class="text-[8px] text-white/30 uppercase font-mono">Session ID: ${Math.random().toString(16).slice(2,8)}</div>
                            </div>
                            <div class="h-8 w-px bg-white/10"></div>
                            ${isPremium ? `<button onclick="CoreEngine.togglePanel('admin-panel')" class="text-xs font-black text-cyan-400 hover:text-white transition uppercase">Control</button>` : ''}
                            <button onclick="CoreEngine.logout()" class="text-[10px] font-bold opacity-40 hover:opacity-100 uppercase">Exit</button>
                        </div>
                    `;
                } else {
                    panel.innerHTML = `
                        <button onclick="CoreEngine.showLogin()" class="btn-action btn-cyan shadow-lg shadow-cyan-500/20">Identify Self</button>
                    `;
                }
            },

            renderGrid() {
                const grid = document.getElementById('core-grid');
                grid.innerHTML = this.state.db.map(item => {
                    const isLocked = item.premium && (!this.state.user || this.state.user.role !== 'admin');
                    return `
                        <div onclick="CoreEngine.launchApp(${item.id})" class="app-card glass p-6 aspect-square flex flex-col items-center justify-center text-center ${item.premium ? 'gold-glow' : ''}">
                            ${isLocked ? `<div class="absolute inset-0 z-10 bg-black/80 backdrop-blur-md rounded-2xl flex flex-col items-center justify-center">
                                <span class="text-3xl mb-2">🔒</span>
                                <span class="text-[10px] font-black text-amber-500 tracking-widest uppercase">Premium Only</span>
                            </div>` : ''}
                            <div class="text-5xl mb-4 drop-shadow-2xl">${item.type === 'game' ? '🎮' : '🛠️'}</div>
                            <div class="text-[11px] font-black uppercase tracking-tighter text-white/80">${item.title}</div>
                            <div class="mt-2 text-[8px] font-mono text-cyan-500/50">${item.type.toUpperCase()} // ID:${item.id}</div>
                        </div>
                    `;
                }).join('');
            },

            // --- AUTH LOGIC ---
            showLogin() {
                const name = prompt("Enter Identity:");
                const pass = prompt("Enter Secret:");
                if ((name === 'admin' && pass === 'admin') || (name === 'asad' && pass === 'asad')) {
                    this.state.user = { name, role: name };
                    localStorage.setItem('ultra_x_user', JSON.stringify(this.state.user));
                    this.addLog(`User Login: ${name}`);
                    this.renderUI();
                } else {
                    alert("ACCESS REJECTED");
                }
            },

            logout() {
                localStorage.removeItem('ultra_x_user');
                location.reload();
            },

            // --- APP MANAGEMENT ---
            launchApp(id) {
                const item = this.state.db.find(i => i.id === id);
                if (item.premium && this.state.user?.role !== 'admin') return alert("AUTHORIZATION FAILED");

                const overlay = document.getElementById('view-overlay');
                const frame = document.getElementById('app-frame');
                const loader = document.getElementById('app-loader');

                document.getElementById('view-title').innerText = `EXECUTING: ${item.title}`;
                overlay.style.display = 'flex';
                loader.style.display = 'flex';
                
                setTimeout(() => {
                    const blob = new Blob([item.code || ''], {type: 'text/html'});
                    frame.src = URL.createObjectURL(blob);
                    loader.style.display = 'none';
                }, 800);
                
                this.addLog(`Launched App: ${item.title}`);
            },

            closeApp() {
                document.getElementById('view-overlay').style.display = 'none';
                document.getElementById('app-frame').src = '';
            },

            // --- ADMIN TABS ---
            switchAdminTab(tab) {
                const view = document.getElementById('admin-view');
                if (tab === 'add') {
                    view.innerHTML = `
                        <div class="space-y-6">
                            <h3 class="text-xl font-black text-cyan-400">DEPLOY NEW MODULE</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="adm_title" type="text" placeholder="שם המשחק/כלי" class="bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none">
                                <select id="adm_type" class="bg-white/5 border border-white/10 p-4 rounded-xl text-white">
                                    <option value="game">משחק</option>
                                    <option value="tool">כלי עבודה</option>
                                </select>
                            </div>
                            <textarea id="adm_code" placeholder="<html> Source Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs h-64 text-cyan-300 font-mono"></textarea>
                            <label class="flex items-center gap-4 text-amber-500 font-black cursor-pointer">
                                <input id="adm_prem" type="checkbox" class="w-6 h-6 accent-amber-500"> נעילת פרימיום (GOLD GLOW)
                            </label>
                            <button onclick="CoreEngine.saveNewItem()" class="w-full py-5 bg-cyan-500 text-black font-black rounded-xl hover:scale-[0.99] transition">הזרק קוד לליבה</button>
                        </div>
                    `;
                } else if (tab === 'manage') {
                    view.innerHTML = `
                        <h3 class="text-xl font-black mb-6 text-cyan-400">MANAGE CORE ASSETS</h3>
                        <div class="space-y-3">
                            ${this.state.db.map(i => `
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                                    <span class="text-sm font-bold uppercase">${i.title} <span class="opacity-30 ml-4">#${i.id}</span></span>
                                    <button onclick="CoreEngine.deleteItem(${i.id})" class="text-red-500 font-black text-[10px] bg-red-500/10 px-4 py-2 rounded-lg">WIPE DATA</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (tab === 'logs') {
                    view.innerHTML = `
                        <h3 class="text-xl font-black mb-6 text-cyan-400">SYSTEM LOGS</h3>
                        <div class="text-[10px] space-y-1">
                            ${this.state.logs.slice().reverse().map(l => `<div><span class="text-white/20">[${l.time}]</span> <span class="text-cyan-500">${l.msg}</span></div>`).join('')}
                        </div>
                    `;
                }
            },

            saveNewItem() {
                const item = {
                    id: Date.now(),
                    title: document.getElementById('adm_title').value,
                    type: document.getElementById('adm_type').value,
                    code: document.getElementById('adm_code').value,
                    premium: document.getElementById('adm_prem').checked
                };
                if (!item.title || !item.code) return alert("DATA INCOMPLETE");
                this.state.db.push(item);
                localStorage.setItem('ultra_x_db', JSON.stringify(this.state.db));
                this.addLog(`Added New Content: ${item.title}`);
                this.renderGrid();
                this.switchAdminTab('manage');
            },

            deleteItem(id) {
                if (!confirm("CONFIRM DATA DESTRUCTION?")) return;
                this.state.db = this.state.db.filter(i => i.id !== id);
                localStorage.setItem('ultra_x_db', JSON.stringify(this.state.db));
                this.renderGrid();
                this.switchAdminTab('manage');
            },

            // --- UTILS ---
            togglePanel(id) {
                const el = document.getElementById(id);
                el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
                if (id === 'admin-panel') this.switchAdminTab('add');
            },

            addLog(msg) {
                const time = new Date().toLocaleTimeString();
                this.state.logs.push({ time, msg });
                if (this.state.logs.length > 50) this.state.logs.shift();
                localStorage.setItem('ultra_x_logs', JSON.stringify(this.state.logs));
            },

            updateUptime() {
                const diff = Math.floor((Date.now() - this.state.startTime) / 1000);
                const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('uptime-display').innerText = `Uptime: ${h}:${m}:${s}`;
            }
        };

        window.onload = () => CoreEngine.init();
    </script>
</body>
</html>
