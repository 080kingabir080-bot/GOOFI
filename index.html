<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO-PLAY | OS TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --premium: #ffac00;
            --danger: #ff0055;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, transparent 50%),
                linear-gradient(rgba(18, 18, 24, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 24, 0.8) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: 'Assistant', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Glassmorphism Classes */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
        .glass-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-hover:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); transform: translateY(-5px); }

        /* Premium Effects */
        .btn-premium {
            background: linear-gradient(45deg, var(--premium), #ff6a00);
            box-shadow: 0 0 15px rgba(255, 172, 0, 0.3);
            transition: 0.3s;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 172, 0, 0.6); }

        /* UI Elements */
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .game-card { aspect-ratio: 1/1.1; position: relative; border-radius: 24px; overflow: hidden; cursor: pointer; }
        
        .locked-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); z-index: 10; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .admin-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 650px; z-index: 1000; display: none;
            flex-direction: column; border-radius: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        input, textarea, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            border-radius: 15px;
            padding: 12px 18px;
        }
        input:focus { border-color: var(--cyan) !important; }

        .loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <section id="homePage" class="page active">
        <header class="p-6 md:p-10 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">PRO<span class="text-[var(--cyan)]">PLAY</span></h1>
                <p id="statusTag" class="text-[9px] font-mono opacity-40 uppercase tracking-widest mt-1">System Terminal v2.0</p>
            </div>
            <div id="authArea" class="flex gap-3"></div>
        </header>

        <main id="gameGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-6 p-6 md:p-10 overflow-y-auto flex-1"></main>
    </section>

    <section id="authPage" class="page items-center justify-center bg-black/40 backdrop-blur-md">
        <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
            <h2 id="authTitle" class="text-3xl font-black mb-8 italic uppercase tracking-tighter">Login</h2>
            <div class="space-y-4">
                <input type="text" id="auth_user" placeholder="USER ID" class="w-full">
                <input type="password" id="auth_pass" placeholder="PASSWORD" class="w-full">
                <button id="auth_btn" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase tracking-tighter hover:bg-[var(--cyan)] transition">Connect</button>
                <p class="text-xs opacity-50">
                    <span id="auth_switch_text">Don't have an account?</span>
                    <span onclick="toggleAuthMode()" id="auth_switch_link" class="text-white underline cursor-pointer">Register</span>
                </p>
                <button onclick="nav('homePage')" class="text-[10px] uppercase opacity-30 hover:opacity-100">Back to Terminal</button>
            </div>
        </div>
    </section>

    <section id="adminPage" class="page">
        <div class="h-20 flex items-center justify-between px-10 glass border-none">
            <span class="font-black tracking-widest text-[var(--cyan)] italic">ROOT@ADMIN_TERMINAL</span>
            <button onclick="nav('homePage')" class="px-6 py-2 bg-[var(--danger)]/20 text-[var(--danger)] rounded-xl font-bold hover:bg-[var(--danger)] hover:text-white transition">Exit</button>
        </div>
        <div class="flex-1 p-10 flex gap-6 flex-wrap content-start">
            <div onclick="openModal('gameModal')" class="glass glass-hover w-32 h-32 rounded-3xl flex flex-col items-center justify-center cursor-pointer">
                <span class="text-4xl mb-2">🎮</span>
                <span class="text-[10px] font-bold uppercase">Add Game</span>
            </div>
            <div onclick="openModal('toolModal')" class="glass glass-hover w-32 h-32 rounded-3xl flex flex-col items-center justify-center cursor-pointer">
                <span class="text-4xl mb-2">🛠️</span>
                <span class="text-[10px] font-bold uppercase">Add Tool</span>
            </div>
            <div id="adminContentList" class="w-full mt-10 space-y-3 max-w-2xl">
                </div>
        </div>
    </section>

    <div id="gameModal" class="admin-window glass p-8">
        <h3 class="text-xl font-black mb-6 text-[var(--cyan)] uppercase">Deploy New Content</h3>
        <input type="text" id="adm_name" placeholder="Game Name" class="w-full mb-4">
        <textarea id="adm_code" rows="5" placeholder="Source HTML/CSS/JS" class="w-full mb-4 font-mono text-xs"></textarea>
        <div class="flex items-center gap-2 mb-6">
            <input type="checkbox" id="adm_premium" class="w-5 h-5 accent-[var(--premium)]">
            <label for="adm_premium" class="text-sm font-bold text-[var(--premium)]">PREMIUM LOCK 💎</label>
        </div>
        <div class="flex gap-3">
            <button onclick="saveItem('game')" class="flex-1 py-4 bg-[var(--cyan)] text-black font-black rounded-xl uppercase">Commit</button>
            <button onclick="closeModal('gameModal')" class="px-6 py-4 glass rounded-xl">Cancel</button>
        </div>
    </div>

    <div id="toolModal" class="admin-window glass p-8">
        <h3 class="text-xl font-black mb-6 text-emerald-400 uppercase">Create System Tool</h3>
        <input type="text" id="tool_name" placeholder="Tool Name" class="w-full mb-4">
        <input type="text" id="tool_emoji" placeholder="Emoji" class="w-full mb-4 text-center">
        <textarea id="tool_code" rows="5" placeholder="Tool Code" class="w-full mb-4 font-mono text-xs"></textarea>
        <div class="flex gap-3">
            <button onclick="saveItem('tool')" class="flex-1 py-4 bg-emerald-500 text-black font-black rounded-xl uppercase">Deploy</button>
            <button onclick="closeModal('toolModal')" class="px-6 py-4 glass rounded-xl">Cancel</button>
        </div>
    </div>

    <div id="gameOverlay" class="fixed inset-0 z-[9999] bg-black hidden flex-col">
        <div class="h-16 flex items-center justify-between px-6 glass border-none">
            <h2 id="ovTitle" class="font-black italic text-[var(--cyan)] uppercase"></h2>
            <button onclick="closeGame()" class="text-3xl opacity-50 hover:opacity-100">&times;</button>
        </div>
        <div id="gameLoader" class="flex-1 flex items-center justify-center"><div class="loader"></div></div>
        <iframe id="gameFrame" class="hidden flex-1 w-full border-none" onload="document.getElementById('gameLoader').style.display='none'; this.classList.remove('hidden')"></iframe>
    </div>

    <script>
        // Database Initialization
        let db = JSON.parse(localStorage.getItem('pp_db_v2')) || [];
        let users = JSON.parse(localStorage.getItem('pp_users_v2')) || [];
        let currentUser = JSON.parse(sessionStorage.getItem('pp_session')) || null;
        let isRegisterMode = false;

        // Navigation
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'homePage') renderHome();
            if(id === 'adminPage') renderAdmin();
        }

        // Auth Logic
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? 'Register' : 'Login';
            document.getElementById('auth_btn').innerText = isRegisterMode ? 'Create Account' : 'Connect';
            document.getElementById('auth_switch_text').innerText = isRegisterMode ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('auth_switch_link').innerText = isRegisterMode ? 'Login' : 'Register';
        }

        document.getElementById('auth_btn').onclick = () => {
            const u = document.getElementById('auth_user').value;
            const p = document.getElementById('auth_pass').value;

            if(!u || !p) return;

            if(isRegisterMode) {
                if(users.some(x => x.name === u)) return alert("User exists");
                users.push({ name: u, pass: p, isPrem: false });
                localStorage.setItem('pp_users_v2', JSON.stringify(users));
                toggleAuthMode();
                alert("Success! Now login.");
            } else {
                if(u === 'ADMIN' && p === 'ADMIN1') return nav('adminPage');
                const user = users.find(x => x.name === u && x.pass === p);
                if(user) {
                    currentUser = user;
                    sessionStorage.setItem('pp_session', JSON.stringify(user));
                    nav('homePage');
                } else alert("Invalid credentials");
            }
        };

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        // Content Management
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function saveItem(type) {
            const id = 'item-' + Date.now();
            let item = { id, type };
            
            if(type === 'game') {
                item.title = document.getElementById('adm_name').value;
                item.code = document.getElementById('adm_code').value;
                item.isPremium = document.getElementById('adm_premium').checked;
                if(!item.title || !item.code) return;
                closeModal('gameModal');
            } else {
                item.title = document.getElementById('tool_name').value;
                item.emoji = document.getElementById('tool_emoji').value || '🛠️';
                item.code = document.getElementById('tool_code').value;
                if(!item.title || !item.code) return;
                closeModal('toolModal');
            }

            db.push(item);
            localStorage.setItem('pp_db_v2', JSON.stringify(db));
            renderAdmin();
        }

        function deleteItem(id) {
            if(!confirm("Purge data?")) return;
            db = db.filter(i => i.id !== id);
            localStorage.setItem('pp_db_v2', JSON.stringify(db));
            renderAdmin();
        }

        // Rendering
        function renderHome() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = db.filter(i => i.type === 'game').map(g => {
                const isLocked = g.isPremium && (!currentUser || !currentUser.isPrem);
                return `
                    <div class="game-card glass glass-hover" onclick="runGame('${g.id}')">
                        ${isLocked ? `<div class="locked-overlay"><span class="text-2xl">🔒</span><span class="text-[8px] mt-2 font-black uppercase opacity-40">Get Premium</span></div>` : ''}
                        <div class="absolute inset-0 flex flex-col items-center justify-center p-4">
                            <span class="text-4xl mb-4">🎮</span>
                            <span class="text-[11px] font-black uppercase tracking-widest text-center">${g.title}</span>
                            ${g.isPremium ? '<span class="text-[8px] text-[var(--premium)] font-black mt-2">💎 PREMIUM</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const auth = document.getElementById('authArea');
            if(currentUser) {
                auth.innerHTML = `
                    <div class="flex items-center gap-4 glass px-4 py-2 rounded-2xl">
                        <div class="text-left">
                            <p class="text-[10px] font-black ${currentUser.isPrem ? 'text-[var(--premium)]' : 'text-white'} italic uppercase">${currentUser.name}</p>
                            ${!currentUser.isPrem ? `<button onclick="upgradePrem()" class="text-[8px] font-bold text-[var(--premium)] underline">UPGRADE</button>` : `<span class="text-[8px] text-[var(--premium)] font-black">PRO</span>`}
                        </div>
                        <button onclick="logout()" class="w-8 h-8 flex items-center justify-center bg-white/5 rounded-lg text-xs hover:text-[var(--danger)] transition">✕</button>
                    </div>
                `;
            } else {
                auth.innerHTML = `
                    <button onclick="nav('authPage')" class="px-6 py-2 glass rounded-xl text-xs font-black uppercase tracking-tighter">Login</button>
                `;
            }
        }

        function renderAdmin() {
            const list = document.getElementById('adminContentList');
            list.innerHTML = db.map(i => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${i.type === 'game' ? '🎮' : i.emoji}</span>
                        <span class="text-sm font-bold uppercase">${i.title}</span>
                        ${i.isPremium ? '💎' : ''}
                    </div>
                    <button onclick="deleteItem('${i.id}')" class="text-[var(--danger)] text-[10px] font-black uppercase px-3 py-1 bg-[var(--danger)]/10 rounded-lg">Delete</button>
                </div>
            `).join('');
        }

        function upgradePrem() {
            if(!currentUser) return nav('authPage');
            currentUser.isPrem = true;
            const idx = users.findIndex(u => u.name === currentUser.name);
            users[idx].isPrem = true;
            localStorage.setItem('pp_users_v2', JSON.stringify(users));
            sessionStorage.setItem('pp_session', JSON.stringify(currentUser));
            alert("Welcome to Premium! 💎");
            renderHome();
        }

        // Engine
        function runGame(id) {
            const item = db.find(i => i.id === id);
            if(item.isPremium && (!currentUser || !currentUser.isPrem)) return alert("Premium membership required.");
            
            document.getElementById('ovTitle').innerText = item.title;
            const frame = document.getElementById('gameFrame');
            const blob = new Blob([item.code], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);
            document.getElementById('gameOverlay').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        window.onload = renderHome;
    </script>
</body>
</html>
