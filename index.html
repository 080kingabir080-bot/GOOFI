<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOFI Tools - ניהול ושליטה</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="space-bg"></div>

<header>
    <div class="logo-container">
        <h1 class="logo">GOOFI</h1>
    </div>
    <div class="user-profile" id="userProfileTrigger">
        <div class="profile-img-container" id="profileBorder">
            <img src="https://via.placeholder.com/50" id="profileDisplay" alt="פרופיל">
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <h2 class="main-title">GOOFI Tools</h2>
        <p class="description">
            🚀 ברוכים הבאים לעולם של שליטה! הכלים שלנו הם חוד החנית בניהול, כלכלה ובקרה. 📈 כלים ייחודיים מבית גופי טולס שיעזרו לכם לכבוש את היעדים שלכם. 💎
        </p>
    </section>

    <div class="tools-grid" id="toolsGrid">
        </div>
</main>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content" id="modalBody">
        </div>
</div>

<div id="loaderOverlay" class="loader-overlay">
    <div class="loader-box">
        <div class="timer-circle" id="timerCircle">
            <span id="timerNum">20</span>
        </div>
        <div class="ad-space">
            <h3>פרסומת GOOFI</h3>
            <p>שדרגו למנוי פרימיום ותיהנו מגישה מיידית ללא המתנה!</p>
            <p>GOOFI - הכלים החזקים ביותר לניהול העסק שלך.</p>
        </div>
    </div>
</div>

<footer>
    <div class="footer-signature">
        Powered by Shimon <span class="live-dot" id="footerDot"></span>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
