<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO-PLAY | The Ultimate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e94560; --premium: #ffd700; --cyan: #00d2ff; --bg: #050505; }
        
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; font-family: 'Assistant', sans-serif;
            background: var(--bg); color: white;
        }

        /* רקע דינמי משתנה */
        .site-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #16213e 0%, #050505 100%);
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.is-premium .site-bg { background: radial-gradient(circle at 50% 50%, #2e2400 0%, #050505 100%); }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }

        /* כרטיס משחק ברמה הכי גבוהה */
        .game-card {
            aspect-ratio: 1/1.1;
            position: relative;
            border-radius: 30px;
            background: #0a0a0a;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* אפקט הילה מסתובבת */
        .game-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--cyan), transparent 30%);
            animation: rotate-light 4s linear infinite;
            opacity: 0; transition: 0.5s;
        }
        .game-card:hover::before { opacity: 0.4; }

        @keyframes rotate-light { 100% { transform: rotate(360deg); } }

        .card-inner {
            position: absolute; inset: 2px;
            background: #0d0d0d; border-radius: 28px;
            z-index: 2; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .game-card:hover { transform: translateY(-12px) scale(1.02); border-color: var(--cyan); box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2); }

        /* כפתור מתנה משונן ומגרה */
        .gift-btn-container { transform: rotate(-2deg); margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(233, 69, 96, 0.3)); }
        .gift-btn {
            background: #e94560; color: white; padding: 35px 70px; font-weight: 900; font-size: 1.6rem;
            cursor: pointer; transition: 0.3s; border: none;
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
        }
        .gift-btn:hover { transform: scale(1.05) rotate(2deg); background: #ff4d6d; }
        .gift-btn::before { content: ''; position: absolute; top: 48%; left: 0; width: 100%; height: 12px; background: rgba(255,255,255,0.8); }
        .gift-btn::after { content: ''; position: absolute; top: 0; left: 28%; width: 12px; height: 100%; background: rgba(255,255,255,0.8); }

        /* פאנל ניהול (מראה של מערכת הפעלה) */
        .admin-icon {
            width: 110px; height: 110px; border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
        }
        .admin-icon:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--cyan); transform: scale(1.1); }

        .admin-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 700px; max-height: 85vh;
            z-index: 1000; display: none; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1);
        }

        /* דפים */
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: flex; }
        @keyframes pageIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        #gameOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="is-normal">
    <div class="site-bg"></div>

    <section id="homePage" class="page active">
        <header class="h-24 flex items-center justify-between px-10 glass m-6 rounded-[35px]">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[var(--cyan)] rounded-xl rotate-45 flex items-center justify-center">
                    <span class="text-black font-black -rotate-45 text-xl">P</span>
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter">PRO-<span id="logoAccent" style="color:var(--cyan)">PLAY</span></h1>
            </div>
            <div id="authArea" class="flex gap-4">
                <button onclick="nav('loginPage')" class="px-8 py-3 border border-white/10 rounded-2xl font-bold hover:bg-white/5 transition">כניסה</button>
                <button onclick="nav('registerPage')" class="px-8 py-3 bg-white text-black font-black rounded-2xl hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition">הצטרפות</button>
            </div>
        </header>
        <main id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-8 p-10 overflow-y-auto flex-1 content-start"></main>
    </section>

    <section id="premiumPage" class="page items-center justify-center bg-black/60 backdrop-blur-md">
        <div class="glass p-16 rounded-[60px] w-full max-w-2xl text-center relative border-yellow-500/20">
            <button onclick="nav('homePage')" class="absolute top-8 right-10 text-3xl opacity-30 hover:opacity-100">✕</button>
            <div class="text-6xl mb-6">💎</div>
            <h2 class="text-6xl font-black mb-4 bg-gradient-to-b from-yellow-300 to-yellow-600 bg-clip-text text-transparent">PREMIUM</h2>
            <p class="text-gray-400 mb-10 text-lg">גישה בלתי מוגבלת לכל המשחקים, ללא פרסומות ועם סטטוס "שחקן זהב" בקהילה.</p>
            
            <div id="buyButtonWrapper">
                <div class="gift-btn-container">
                    <button onclick="startPayment()" class="gift-btn"><span>קבלת גישה מיידית</span></button>
                </div>
            </div>

            <div id="verificationUI" class="hidden mt-10">
                <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden border border-white/10">
                    <div id="pBar" class="h-full bg-yellow-500 w-0 transition-all duration-[6000ms] linear"></div>
                </div>
                <p class="text-yellow-500 mt-6 font-bold text-xl animate-pulse">סולק תשלום מאובטח...</p>
            </div>

            <div id="successUI" class="hidden mt-10">
                <button onclick="applyPremium()" class="w-full py-6 bg-yellow-500 text-black font-black rounded-3xl text-3xl shadow-[0_20px_50px_rgba(234,179,8,0.4)]">הפעל סטטוס זהב ✅</button>
            </div>
        </div>
    </section>

    <section id="adminPage" class="page">
        <div class="h-20 flex items-center justify-between px-10 bg-white/5 backdrop-blur-2xl border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <span class="mr-4 font-black tracking-widest text-cyan-400">PRO-ADMIN // TERMINAL</span>
            </div>
            <button onclick="nav('homePage')" class="px-6 py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">יציאה בטוחה</button>
        </div>
        
        <div class="flex-1 p-12 flex gap-12 flex-wrap content-start">
            <div class="admin-icon" onclick="openAdminTool('addGameTool')">
                <span class="text-4xl mb-2">⚡</span>
                <span class="text-xs font-black uppercase tracking-tighter">הוספת תוכן</span>
            </div>
            <div class="admin-icon" onclick="openAdminTool('manageGamesTool')">
                <span class="text-4xl mb-2">💾</span>
                <span class="text-xs font-black uppercase tracking-tighter">ניהול ספריה</span>
            </div>
            <div class="admin-icon" onclick="alert('Database: 2,492 Users Active')">
                <span class="text-4xl mb-2">🔥</span>
                <span class="text-xs font-black uppercase tracking-tighter">סטטיסטיקה</span>
            </div>
        </div>

        <div id="addGameTool" class="admin-window glass rounded-[45px] p-12">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-3xl font-black italic">DEPLOY NEW GAME</h3>
                <button onclick="closeAdminTool('addGameTool')" class="text-2xl opacity-40 hover:opacity-100">✕</button>
            </div>
            <input type="text" id="adm_name" placeholder="שם המשחק (למשל: Neon Shooter)" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-6 text-xl focus:border-[var(--cyan)] transition">
            <textarea id="adm_code" rows="10" placeholder="הדבק כאן את קוד ה-HTML/JS של המשחק..." class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-8 font-mono text-xs focus:border-[var(--cyan)] transition"></textarea>
            <button onclick="saveNewGame()" class="w-full py-6 bg-cyan-600 text-white text-xl font-black rounded-2xl hover:bg-cyan-500 shadow-2xl transition">שגר לאתר המבצעי</button>
        </div>

        <div id="manageGamesTool" class="admin-window glass rounded-[45px] p-12 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black italic">LIBRARY MANAGER</h3>
                <button onclick="closeAdminTool('manageGamesTool')" class="text-2xl opacity-40">✕</button>
            </div>
            <div id="adminGameList" class="space-y-3 overflow-y-auto pr-4"></div>
        </div>
    </section>

    <div id="gameOverlay">
        <div class="h-20 flex items-center justify-between px-10 bg-black border-b border-white/10">
            <div class="flex items-center gap-4">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <h2 id="ovTitle" class="font-black italic text-2xl tracking-widest uppercase"></h2>
            </div>
            <button onclick="closeGame()" class="text-5xl font-light hover:text-red-500 transition">&times;</button>
        </div>
        <iframe id="gameFrame" allow="autoplay"></iframe>
    </div>

    <section id="loginPage" class="page items-center justify-center bg-black/80">
        <div class="glass p-16 rounded-[50px] w-full max-w-md text-center border-white/5">
            <h2 class="text-4xl font-black mb-10 italic">LOGIN</h2>
            <input type="text" id="l_user" placeholder="שם משתמש" class="w-full bg-white/5 p-5 rounded-2xl mb-4 border border-white/10 focus:border-cyan-500 transition">
            <input type="password" id="l_pass" placeholder="סיסמה" class="w-full bg-white/5 p-5 rounded-2xl mb-8 border border-white/10 focus:border-cyan-500 transition">
            <button onclick="processLogin()" class="w-full py-5 bg-cyan-600 rounded-2xl font-black text-xl hover:scale-105 transition">התחבר עכשיו</button>
            <p class="mt-6 text-gray-500 text-sm">אין לך חשבון? <span class="text-white cursor-pointer hover:underline" onclick="nav('registerPage')">הירשם כאן</span></p>
        </div>
    </section>

    <section id="registerPage" class="page items-center justify-center bg-black/80">
        <div class="glass p-16 rounded-[50px] w-full max-w-md text-center border-white/5">
            <h2 class="text-4xl font-black mb-10 italic">JOIN THE CLUB</h2>
            <input type="text" id="r_user" placeholder="בחר שם משתמש" class="w-full bg-white/5 p-5 rounded-2xl mb-4 border border-white/10 focus:border-cyan-500 transition">
            <input type="password" id="r_pass" placeholder="בחר סיסמה" class="w-full bg-white/5 p-5 rounded-2xl mb-8 border border-white/10 focus:border-cyan-500 transition">
            <button onclick="processRegister()" class="w-full py-5 bg-white text-black rounded-2xl font-black text-xl hover:scale-105 transition">צור חשבון בחינם</button>
        </div>
    </section>

    <script>
        let games = JSON.parse(localStorage.getItem('pp_ultra_v1')) || [];
        let users = JSON.parse(localStorage.getItem('pp_users_v1')) || [];
        let currentUser = JSON.parse(sessionStorage.getItem('pp_active')) || null;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'homePage') renderGames();
            if(id === 'adminPage') renderAdminGames();
        }

        function openAdminTool(id) { document.getElementById(id).style.display = 'flex'; }
        function closeAdminTool(id) { document.getElementById(id).style.display = 'none'; }

        function processRegister() {
            const u = document.getElementById('r_user').value;
            const p = document.getElementById('r_pass').value;
            if(!u || !p) return;
            users.push({name: u, pass: p, isPrem: false});
            localStorage.setItem('pp_users_v1', JSON.stringify(users));
            alert("החשבון נוצר! עכשיו אפשר להתחבר.");
            nav('loginPage');
        }

        function processLogin() {
            const u = document.getElementById('l_user').value;
            const p = document.getElementById('l_pass').value;
            if(u === 'admin' && p === 'admin') return nav('adminPage');
            const found = users.find(x => x.name === u && x.pass === p);
            if(found) { 
                currentUser = found; 
                sessionStorage.setItem('pp_active', JSON.stringify(found)); 
                checkPremium(); 
                nav('homePage'); 
            } else {
                alert("פרטים לא נכונים. נסה שוב.");
            }
        }

        function startPayment() {
            if(!currentUser) return alert("עליך להתחבר קודם!");
            document.getElementById('buyButtonWrapper').classList.add('hidden');
            document.getElementById('verificationUI').classList.remove('hidden');
            setTimeout(() => { document.getElementById('pBar').style.width = "100%"; }, 100);
            setTimeout(() => {
                document.getElementById('verificationUI').classList.add('hidden');
                document.getElementById('successUI').classList.remove('hidden');
            }, 6100);
        }

        function applyPremium() {
            currentUser.isPrem = true;
            const idx = users.findIndex(x => x.name === currentUser.name);
            if(idx !== -1) users[idx].isPrem = true;
            localStorage.setItem('pp_users_v1', JSON.stringify(users));
            sessionStorage.setItem('pp_active', JSON.stringify(currentUser));
            checkPremium(); 
            nav('homePage');
        }

        function checkPremium() {
            if(currentUser?.isPrem) {
                document.body.classList.add('is-premium');
                document.getElementById('logoAccent').style.color = 'var(--premium)';
            }
        }

        function renderGames() {
            const grid = document.getElementById('gameGrid');
            const isP = currentUser?.isPrem;
            grid.innerHTML = games.map(g => `
                <div class="game-card" onclick="tryOpenGame('${g.id}')">
                    <div class="card-inner">
                        <div class="w-20 h-20 bg-white/5 rounded-[22px] border border-white/10 flex items-center justify-center text-4xl mb-4">
                            ${isP ? '💎' : '⚡'}
                        </div>
                        <span class="text-[11px] font-black tracking-widest uppercase text-center opacity-70">${g.title}</span>
                        <div class="mt-4 px-4 py-1 bg-white/5 rounded-full text-[9px] font-bold border border-white/10">PLAY</div>
                    </div>
                </div>
            `).join('');

            const auth = document.getElementById('authArea');
            if(currentUser) {
                auth.innerHTML = `
                    ${!isP ? '<button onclick="nav(\'premiumPage\')" class="bg-yellow-500 text-black px-6 py-2 rounded-2xl font-black text-sm animate-pulse">UPGRADE</button>' : ''}
                    <div class="flex flex-col items-end">
                        <span class="text-sm font-black ${isP ? 'text-yellow-500' : 'text-cyan-400'}">${currentUser.name}</span>
                        <button onclick="sessionStorage.clear(); location.reload();" class="text-[9px] opacity-30 hover:opacity-100 italic">LOGOUT</button>
                    </div>
                `;
            }
        }

        function tryOpenGame(id) {
            if(!currentUser) {
                alert("🔒 הגישה נחסמה! כדי לשחק בפורטל PRO-PLAY עליך להירשם.");
                nav('registerPage');
                return;
            }
            const g = games.find(x => x.id == id);
            document.getElementById('ovTitle').innerText = g.title;
            const blob = new Blob([g.code], {type: 'text/html'});
            document.getElementById('gameFrame').src = URL.createObjectURL(blob);
            document.getElementById('gameOverlay').style.display = 'flex';
        }

        function closeGame() { document.getElementById('gameOverlay').style.display = 'none'; document.getElementById('gameFrame').src = ''; }

        function saveNewGame() {
            const n = document.getElementById('adm_name').value;
            const c = document.getElementById('adm_code').value;
            if(!n || !c) return;
            games.push({id: Date.now(), title: n, code: c});
            localStorage.setItem('pp_ultra_v1', JSON.stringify(games));
            closeAdminTool('addGameTool');
            renderAdminGames();
            alert("בוצע! המשחק זמין כעת לכל המשתמשים.");
        }

        function renderAdminGames() {
            document.getElementById('adminGameList').innerHTML = games.map(g => `
                <div class="flex justify-between items-center glass p-5 rounded-2xl border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-2 bg-cyan-500 rounded-full"></div>
                        <span class="font-bold text-sm">${g.title}</span>
                    </div>
                    <button onclick="delGame(${g.id})" class="text-red-500 text-xs font-black border border-red-500/20 px-4 py-1.5 rounded-xl hover:bg-red-500 hover:text-white transition">DELETE</button>
                </div>
            `).join('');
        }

        function delGame(id) {
            if(confirm("למחוק את המשחק מהספריה?")) {
                games = games.filter(g => g.id != id);
                localStorage.setItem('pp_ultra_v1', JSON.stringify(games));
                renderAdminGames();
            }
        }

        window.onload = () => { 
            checkPremium(); 
            renderGames(); 
            // אם האדמין מחובר, להראות את הפאנל
            if(currentUser?.name === 'admin') nav('adminPage');
        };
    </script>
</body>
</html>
